<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Finanças PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#22c55e;
  --danger:#ef4444;
  --text:#e2e8f0;
}

body{
  font-family: Arial;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:15px;
}

header{
  background:linear-gradient(135deg,#22c55e,#15803d);
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.stat{
  text-align:center;
}

input,select{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.transacao{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #334155;
}

.entrada{color:#22c55e}
.saida{color:#ef4444}

.delete{
  background:var(--danger);
  padding:4px 8px;
  font-size:12px;
  border-radius:6px;
}

button:hover{
  opacity:0.9;
  transform:scale(1.02);
  transition:0.2s;
}

.card{
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<script type="module">
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC9bzY8IsavRdL9N4L8B0IQgOSQ-qgE_Y",
  authDomain: "financasbarreto-30f9d.firebaseapp.com",
  projectId: "financasbarreto-30f9d",
  storageBucket: "financasbarreto-30f9d.firebasestorage.app",
  messagingSenderId: "673333294399",
  appId: "1:673333294399:web:86fc5b776191e42d648f8a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 SALVAR ONLINE
async function salvarOnline(uid, dado){
  await addDoc(collection(db, "usuarios", uid, "transacoes"), dado);
}

// 🔥 REMOVER ONLINE
async function removerOnline(uid, id){
  await deleteDoc(doc(db, "usuarios", uid, "transacoes", id));
}

async function registrar(email, senha){
  await createUserWithEmailAndPassword(auth, email, senha);
}

async function login(email, senha){
  await signInWithEmailAndPassword(auth, email, senha);
}

function logout(){
  signOut(auth);
}
  
window.salvarOnline = salvarOnline;
window.removerOnline = removerOnline;
  window.login = login;
window.registrar = registrar;
window.logout = logout;
  
</script>
  
<body>

<header>💳 Finanças PRO</header>

<p id="userInfo" style="text-align:center; margin-top:10px;"></p>
  
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="loginUI()">Entrar</button>
  <button onclick="registrarUI()">Registrar</button>
  <button onclick="logout()">Sair</button>
</div>
  
<div class="card grid">
  <div class="stat">
    <small>Saldo</small>
    <h3 id="saldo">R$0</h3>
  </div>
  <div class="stat">
    <small>Entradas</small>
    <h3 id="entradas">R$0</h3>
  </div>
  <div class="stat">
    <small>Saídas</small>
    <h3 id="saidas">R$0</h3>
  </div>
</div>

<div class="card">
  <h3>Previsão</h3>
  <p id="previsao"></p>
</div>
  
<div class="card">
  <button onclick="graficoCategorias()">Categorias</button>
  <button onclick="graficoEvolucao()">Evolução</button>
</div>
  
<canvas id="grafico"></canvas>

<div class="card">
  <h3>Meta</h3>
  <input id="metaValor" placeholder="Valor da meta">
  <button onclick="definirMeta()">Salvar Meta</button>
<p id="metaInfo"></p>

<div style="background:#334155; border-radius:10px; height:20px; margin-top:10px;">
  <div id="barraMeta" style="
    height:100%;
    width:0%;
    background:#22c55e;
    border-radius:10px;
    transition:0.5s;
  "></div>
</div>

<div class="card">
  <h3>Reserva Automática (%)</h3>
  <input id="reservaPct" placeholder="Ex: 10">
</div>

<div class="card">
  <h3>Reserva</h3>
  <h2 id="reserva">R$0</h2>
</div>

<div class="card">
  <h3>Nova Transação</h3>
  <input id="valor" placeholder="Valor">
  
  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>

<select id="categoria">
  <optgroup label="Renda">
    <option>Salário</option>
    <option>Extra</option>
  </optgroup>

  <optgroup label="Despesas">
    <option>Mercado</option>
    <option>Internet</option>
    <option>Lazer</option>
  </optgroup>
</select>

  <button onclick="add()">Adicionar</button>
</div>

<div class="card">
  <input type="month" id="filtroMes">
  <h3>Histórico</h3>
  <input type="date" id="filtro">
  <div id="lista"></div>
</div>

<script>

let dados = [];
let meta = Number(localStorage.getItem("meta")) || 0;
let reserva = Number(localStorage.getItem("reserva")) || 0;

const formatar = v =>
  v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

function loginUI(){
  login(email.value, senha.value);
}

function registrarUI(){
  registrar(email.value, senha.value);
}
  
function definirMeta(){
  meta = Number(document.getElementById("metaValor").value);
  localStorage.setItem("meta", meta);
  atualizar();
}

async function add(){
  let valor = parseFloat(document.getElementById("valor").value);
  let tipo = document.getElementById("tipo").value;
  let categoria = document.getElementById("categoria").value;
  let reservaPct = Number(document.getElementById("reservaPct").value) || 0;

  if(!valor) return alert("Digite valor");

  if(tipo === "entrada"){
    let guardar = valor * (reservaPct / 100);
    reserva += guardar;
    valor -= guardar;
    localStorage.setItem("reserva", reserva);
  }

  let hoje = new Date();

 const user = auth.currentUser;

if(!user) return alert("Faça login primeiro");

await salvarOnline(user.uid, {
    valor,
    tipo,
    categoria,
    data: hoje.toLocaleDateString(),
    dataISO: hoje.toISOString().split("T")[0]
  });
  
document.getElementById("valor").value = "";
document.getElementById("categoria").selectedIndex = 0;  
}
    
let chart;

function graficoCategorias(){
  let categorias = {};

  dados.forEach(d=>{
    if(d.tipo === "saida"){
      categorias[d.categoria] = (categorias[d.categoria] || 0) + d.valor;
    }
  });

  // ✅ AGORA sim verifica depois de preencher
  if(Object.keys(categorias).length === 0){
    if(chart) chart.destroy();
    return;
  }

  const ctx = document.getElementById("grafico").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"pie",
    data:{
      labels:Object.keys(categorias),
      datasets:[{
        data:Object.values(categorias)
      }]
    }
  });
}

function remover(i){
  const user = auth.currentUser;
  if(!user) return alert("Erro de autenticação");

  removerOnline(user.uid, dados[i].id);
}
  
function atualizar(){
  let saldo=0, entradas=0, saidas=0;

  let filtroDia = document.getElementById("filtro").value;
let filtroMes = document.getElementById("filtroMes").value;
  const lista = document.getElementById("lista");
  lista.innerHTML="";

  dados.forEach((d,i)=>{

    if(filtroDia && d.dataISO !== filtroDia) return;

if(filtroMes && !d.dataISO.startsWith(filtroMes)) return;

    if(d.tipo==="entrada"){
      saldo += d.valor;
      entradas += d.valor;
    } else{
      saldo -= d.valor;
      saidas += d.valor;
    }

    lista.innerHTML += `
      <div class="transacao">
        <div>
          <strong>${formatar(d.valor)}</strong><br>
          <small>${d.categoria} • ${d.data}</small>
        </div>
        <div>
          <span class="${d.tipo}">${d.tipo}</span>
          <button class="delete" onclick="remover(${i})">X</button>
        </div>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = formatar(saldo);
  document.getElementById("entradas").innerText = formatar(entradas);
  document.getElementById("saidas").innerText = formatar(saidas);
  document.getElementById("reserva").innerText = formatar(reserva);
  document.getElementById("filtroMes").addEventListener("input", atualizar);

if(meta > 0){
  let falta = meta - saldo;
  if(falta < 0) falta = 0;

  document.getElementById("metaInfo").innerText =
    "Meta: " + formatar(meta) +
    " | Falta: " + formatar(falta);
}

let progresso = 0;

if(meta > 0){
  progresso = (saldo / meta) * 100;
  if(progresso > 100) progresso = 100;

  document.getElementById("barraMeta").style.width = progresso + "%";
}  

let media = 0;

if(dados.length > 0){
  let total = 0;

  dados.forEach(d=>{
    if(d.tipo === "entrada") total += d.valor;
    else total -= d.valor;
  });

  media = total / dados.length;
}

let previsao = saldo + (media * 30);

document.getElementById("previsao").innerText =
  "Saldo estimado em 30 dias: " + formatar(previsao);  
  
graficoCategorias();
}

function graficoEvolucao(){
  let meses = {};

  dados.forEach(d=>{
    let mes = d.dataISO.slice(0,7);
    if(!meses[mes]) meses[mes] = 0;

    if(d.tipo==="entrada") meses[mes]+=d.valor;
    else meses[mes]-=d.valor;
  });

  const ctx = document.getElementById("grafico").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:Object.keys(meses),
      datasets:[{
        label:"Saldo",
        data:Object.values(meses)
      }]
    }
  });
}

function carregarTempoReal(uid){
  const ref = collection(db, "usuarios", uid, "transacoes");

  onSnapshot(ref, snapshot => {
    dados = [];
    snapshot.forEach(docItem => {
      dados.push({ id: docItem.id, ...docItem.data() });
    });
    atualizar();
  });
}
  
document.getElementById("filtro").addEventListener("input", atualizar);

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById("userInfo").innerText = "Logado: " + user.email;

    document.getElementById("loginBox").style.display = "none"; // 🔥 esconder login

    carregarTempoReal(user.uid);
  } else{
    document.getElementById("userInfo").innerText = "";

    document.getElementById("loginBox").style.display = "block"; // 🔥 mostrar login

    dados = [];
    atualizar();
  }
});

window.add = add;
window.remover = remover;
window.definirMeta = definirMeta;
    
</script>

</body>
</html>
