<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Finanças PRO+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#0f172a; --card:#1e293b; --accent:#22c55e;
  --danger:#ef4444; --text:#e2e8f0; --warning:#facc15;
}
body{font-family:Arial, background:var(--bg); color:var(--text); margin:0; padding:15px;}
header{background:linear-gradient(135deg,#22c55e,#15803d); padding:15px; border-radius:12px; text-align:center; font-weight:bold; font-size:22px;}
.card{background:var(--card); padding:15px; border-radius:12px; margin-top:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3);}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px;}
.stat{text-align:center;}
input,select{width:100%; padding:8px; border:none; border-radius:8px; margin:5px 0;}
button{width:100%; padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; cursor:pointer;}
button:hover{opacity:0.9; transform:scale(1.02); transition:0.2s;}

  .barra-meta{background:#334155; border-radius:10px; height:20px; margin-top:10px;}

  .barra-preenchida{height:100%; width:0%; background:var(--accent); border-radius:10px; transition:0.5s;}

.transacao{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #334155;
  transition:0.2s;
}

.transacao:hover{
  background:#334155;
  transform:scale(1.02);
}

  .entrada{color:#22c55e;} .saida{color:#ef4444;}

  .delete{background:var(--danger); padding:4px 8px; font-size:12px; border-radius:6px;}

  .alerta{color:var(--warning); font-weight:bold;}

  @media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>
</head>

<body>
<header>💳 Finanças PRO+</header>

<!-- Metas -->
<div class="card">
  <h3>Meta Mensal</h3>
  <div class="barra-meta"><div id="barraMeta" class="barra-preenchida"></div></div>
  <p id="metaInfo">R$0 | Falta: R$0</p>
  <p id="alertaMeta"></p>
  <input id="metaValor" placeholder="Valor da meta"><button onclick="definirMeta()">Salvar Meta</button>
</div>

<!-- Renda Fixa -->
<div class="card">
  <h3>Renda Fixa</h3>
  <input id="rendaFixaValor" placeholder="Valor">
  <select id="rendaFixaCategoria">
  <option>Salário</option>
  <option>Freelance</option>
  <option>Investimentos</option>
</select>
  <button onclick="addRendaFixa()">Adicionar Renda Fixa</button>
  <div id="listaRendaFixa"></div>
</div>

<!-- Despesas Fixas -->
<div class="card">
  <h3>Despesas Fixas</h3>
  <input id="despFixaValor" placeholder="Valor">
  <input id="despFixaCategoria" placeholder="Categoria">
  <button onclick="addDespFixa()">Adicionar Despesa Fixa</button>
  <div id="listaDespFixa"></div>
</div>

<!-- Extras -->
<div class="card">
  <h3>Extras</h3>
  <input id="extraValor" placeholder="Valor">
  <input id="extraCategoria" placeholder="Categoria">
  <input type="date" id="extraData">
  <button onclick="addExtra()">Adicionar Extra</button>
  <div id="listaExtras"></div>
</div>

<!-- Despesas Variáveis -->
<div class="card">
  <h3>Despesas do Mês</h3>
  <input id="despValor" placeholder="Valor">
  <input id="despCategoria" placeholder="Categoria">
  <input type="date" id="despData">
  <button onclick="addDesp()">Adicionar Despesa</button>
  <div id="listaDespesas"></div>
</div>

<!-- Resumo -->
<div class="card grid">
  <div class="stat"><small>Saldo</small><h3 id="saldo">R$0</h3></div>
  <div class="stat"><small>Entradas</small><h3 id="entradas">R$0</h3></div>
  <div class="stat"><small>Saídas</small><h3 id="saidas">R$0</h3></div>
  <div class="stat"><small>Reserva</small><h3 id="reserva">R$0</h3></div>
</div>

<!-- Gráficos -->
<div class="card grid">
  <div><canvas id="graficoCategorias"></canvas></div>
  <div><canvas id="graficoEvolucao"></canvas></div>
</div>

<div class="card">
  <h3>Previsão de saldo futuro (30 dias)</h3>
  <p id="previsao"></p>

  <button onclick="logout()">Sair</button>

  <button onclick="limparDados()" style="background:#ef4444; margin-top:10px;">
    ⚠️ Resetar Tudo
  </button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDC9bzY8IsavRdL9N4L8B0IQgOSQ-qgE_Y",
  authDomain: "financasbarreto-30f9d.firebaseapp.com",
  projectId: "financasbarreto-30f9d",
  storageBucket: "financasbarreto-30f9d.firebasestorage.app",
  messagingSenderId: "673333294399",
  appId: "1:673333294399:web:86fc5b776191e42d648f8a",
  measurementId: "G-7RC7ES7824"
};

const saldoElem = document.getElementById("saldo");
const entradasElem = document.getElementById("entradas");
const saidasElem = document.getElementById("saidas");
const reservaElem = document.getElementById("reserva");
const previsao = document.getElementById("previsao");
const listaRendaFixa = document.getElementById("listaRendaFixa");
const listaDespFixa = document.getElementById("listaDespFixa");
  
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// VARIÁVEIS
let rendaFixa=[], despFixa=[], extras=[], despesas=[];
let meta = Number(localStorage.getItem("meta"))||0;

// LOGOUT
window.logout = ()=> signOut(auth).then(()=>window.location.href="login.html");

// META
window.definirMeta = ()=>{
  meta = Number(metaValor.value)||0;
  localStorage.setItem("meta",meta);
  atualizar();
};

// 🔥 ADICIONAR ITEM GENÉRICO
async function adicionarItem(col, data){
  const user = auth.currentUser;
  if(!user) return alert("Faça login");

  await addDoc(collection(db,"usuarios",user.uid,col), data);
}

// ✅ RENDA FIXA (com categoria padrão)
window.addRendaFixa = ()=>{
  const valor = rendaFixaValor.value;
  const categoria = rendaFixaCategoria.value || "Salário";
  if(!valor) return;

  adicionarItem("rendaFixa",{valor:Number(valor),categoria});
  rendaFixaValor.value = "";
rendaFixaCategoria.value = "Salário";
};

// 🔥 DESPESA FIXA COM PARCELA
window.addDespFixa = ()=>{
  const valor = despFixaValor.value;
  const categoria = despFixaCategoria.value;
  const tipo = prompt("Digite: parcelado ou recorrente");

  if(!valor || !categoria || !tipo) return;

  if(tipo === "parcelado"){
    const total = Number(prompt("Total de parcelas"));

    adicionarItem("despesasFixas",{
      valor:Number(valor),
      categoria,
      tipo:"parcelado",
      parcelasTotal: total,
      parcelasPagas: 0
    });

  } else {

    adicionarItem("despesasFixas",{
      valor:Number(valor),
      categoria,
      tipo:"recorrente"
    });

  }

  // ✅ LIMPA SEMPRE (no final)
  despFixaValor.value = "";
  despFixaCategoria.value = "";
};

// PAGAR PARCELA
window.pagarParcela = async(id)=>{
  const user = auth.currentUser;
  const ref = doc(db,"usuarios",user.uid,"despesasFixas",id);
  const item = despFixa.find(d=>d.id===id);

  if(item.parcelasPagas + 1 >= item.parcelasTotal){
    await deleteDoc(ref);
  } else {
    await updateDoc(ref,{ parcelasPagas: item.parcelasPagas + 1 });
  }
};

// EDITAR
window.editarItem = async(col,id,valor,categoria)=>{
  const novoValor = prompt("Novo valor:", valor);
  const novaCategoria = prompt("Nova categoria:", categoria);
  if(!novoValor || !novaCategoria) return;

  const user = auth.currentUser;
  await updateDoc(doc(db,"usuarios",user.uid,col,id),{
    valor:Number(novoValor),
    categoria:novaCategoria
  });
};

// RESET
window.limparDados = async ()=>{
  if(!confirm("Apagar tudo?")) return;
  if(prompt("Digite CONFIRMAR") !== "CONFIRMAR") return;

  const user = auth.currentUser;
  const cols = ["rendaFixa","despesasFixas","extras","despesasMes"];

  for(const c of cols){
    const snap = await getDocs(collection(db,"usuarios",user.uid,c));
    for(const d of snap.docs){
      await deleteDoc(d.ref);
    }
  }

  alert("Tudo apagado");
};

// LISTENER
function carregar(col, setter){
  const user = auth.currentUser;
  const ref = collection(db,"usuarios",user.uid,col);

  onSnapshot(ref,snap=>{
    const arr=[];
    snap.forEach(d=>arr.push({id:d.id,...d.data()}));
    setter(arr);
    atualizar();
  });
}

window.addExtra = ()=>{
  const valor = extraValor.value;
  const categoria = extraCategoria.value;
  const data = extraData.value;

  if(!valor || !categoria) return;

  adicionarItem("extras",{
    valor:Number(valor),
    categoria,
    data,
    tipo: valor > 0 ? "entrada" : "saida"
  });

  // ✅ LIMPAR CAMPOS (fora do objeto)
  extraValor.value = "";
  extraCategoria.value = "";
  extraData.value = "";
};

window.addDesp = ()=>{
  const valor = despValor.value;
  const categoria = despCategoria.value;
  const data = despData.value;

  if(!valor || !categoria) return;

  adicionarItem("despesasMes",{
    valor:Number(valor),
    categoria,
    data
  });

  // ✅ LIMPAR CAMPOS
  despValor.value = "";
  despCategoria.value = "";
  despData.value = "";
};

let graficoCat, graficoEvo;

function gerarGraficos(){
  // 🔹 Agrupar por categoria
  const categorias = {};
  
  despesas.forEach(d=>{
    categorias[d.categoria] = (categorias[d.categoria]||0) + d.valor;
  });

const labels = Object.keys(categorias);
const valores = Object.values(categorias);

if(labels.length === 0){
  return;
}

  if(graficoCat) graficoCat.destroy();

  graficoCat = new Chart(document.getElementById("graficoCategorias"), {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: valores
      }]
    }
  });

  // 🔹 Evolução do saldo
  let saldoTemp = 0;
  const dias = [];
  const valoresEvo = [];

  despesas
    .sort((a,b)=> new Date(a.data) - new Date(b.data))
    .forEach(d=>{
      saldoTemp -= d.valor;
      dias.push(d.data || "dia");
      valoresEvo.push(saldoTemp);
    });

  if(graficoEvo) graficoEvo.destroy();

  graficoEvo = new Chart(document.getElementById("graficoEvolucao"), {
    type: "line",
    data: {
      labels: dias,
      datasets: [{
        label:"Saldo",
        data: valoresEvo
      }]
    }
  });
}
  
// UI
function atualizar(){
  let saldo=0, entradas=0, saidas=0;

  listaRendaFixa.innerHTML="";
  listaDespFixa.innerHTML="";
  listaExtras.innerHTML="";
  listaDespesas.innerHTML="";

  // RENDA FIXA
  rendaFixa.forEach(d=>{
    saldo+=d.valor;
    entradas+=d.valor;

    listaRendaFixa.innerHTML+=`
    <div class="transacao entrada">
      ${d.categoria} - ${d.valor}
    </div>`;
  });

  // DESPESA FIXA
  despFixa.forEach(d=>{
    let pagar = true;

    if(d.tipo==="parcelado"){
      if(d.parcelasPagas >= d.parcelasTotal) pagar=false;
    }

    if(pagar){
      saldo-=d.valor;
      saidas+=d.valor;
    }
    
    listaDespFixa.innerHTML+=`
    <div class="transacao saida">
      ${d.categoria} - ${d.valor}
    </div>`;
  });

  // EXTRAS
  extras.forEach(d=>{
    if(d.tipo==="entrada"){
      saldo+=d.valor;
      entradas+=d.valor;
    } else {
      saldo-=d.valor;
      saidas+=d.valor;
    }

    listaExtras.innerHTML+=`
    <div class="transacao ${d.tipo==="entrada"?"entrada":"saida"}">
      ${d.categoria} - ${d.valor}
    </div>`;
  });

  // DESPESAS DO MÊS
  despesas.forEach(d=>{
    saldo-=d.valor;
    saidas+=d.valor;

    listaDespesas.innerHTML+=`
    <div class="transacao saida">
      ${d.categoria} - ${d.valor}
    </div>`;
  });

  // RESERVA (20% do saldo positivo)
  let reserva = saldo > 0 ? saldo * 0.2 : 0;

  // UI
  saldoElem.innerText = saldo.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  entradasElem.innerText = entradas.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  saidasElem.innerText = saidas.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  reservaElem.innerText = reserva.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  atualizarMeta(saldo);
  gerarGraficos();
  calcularPrevisao(saldo);

if(saidas > entradas){
  previsao.innerText = previsao.innerText.replace(/⚠️.*/,"");
  previsao.innerText += " ⚠️ Você está gastando mais do que ganha!";
}
  
}

function calcularPrevisao(saldo){
  const mediaGasto = despesas.length 
    ? despesas.reduce((a,b)=>a+b.valor,0)/despesas.length 
    : 0;

  const previsao30 = saldo - (mediaGasto * 30);

  previsao.innerText = 
    "Saldo estimado em 30 dias: " +
    previsao30.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}
  
function atualizarMeta(saldo){
  if(meta <= 0) return;

  const barra = document.getElementById("barraMeta");
  const info = document.getElementById("metaInfo");
  const alerta = document.getElementById("alertaMeta");
  
  const porcentagem = Math.min((saldo/meta)*100,100);
  barra.style.width = porcentagem + "%";

  const falta = meta - saldo;

  info.innerText =
    `Meta: ${meta.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
     | Falta: ${falta.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}`;

  if(porcentagem >= 100){
    alerta.innerText = "🎉 Meta atingida!";
    alerta.className = "";
  } else if(porcentagem >= 70){
    alerta.innerText = "🔥 Quase lá!";
    alerta.className = "alerta";
  } else {
    alerta.innerText = "";
  }
}
  
// AUTH
let carregado = false;

onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href = "login.html";
    return;
  }

  if(carregado) return; // 🔥 impede duplicação

  carregado = true;

  carregar("rendaFixa", v=>rendaFixa=v);
  carregar("despesasFixas", v=>despFixa=v);
  carregar("extras", v=>extras=v);
  carregar("despesasMes", v=>despesas=v);
});

</script>
  
</body>
</html>
