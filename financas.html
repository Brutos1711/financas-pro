<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Finanças PRO+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#0f172a; --card:#1e293b; --accent:#22c55e;
  --danger:#ef4444; --text:#e2e8f0; --warning:#facc15;
}
body{font-family:Arial, background:var(--bg); color:var(--text); margin:0; padding:15px;}
header{background:linear-gradient(135deg,#22c55e,#15803d); padding:15px; border-radius:12px; text-align:center; font-weight:bold; font-size:22px;}
.card{background:var(--card); padding:15px; border-radius:12px; margin-top:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3);}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px;}
.stat{text-align:center;}
input,select{width:100%; padding:8px; border:none; border-radius:8px; margin:5px 0;}
button{width:100%; padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; cursor:pointer;}
button:hover{opacity:0.9; transform:scale(1.02); transition:0.2s;}
.barra-meta{background:#334155; border-radius:10px; height:20px; margin-top:10px;}
.barra-preenchida{height:100%; width:0%; background:var(--accent); border-radius:10px; transition:0.5s;}
.transacao{display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #334155;}
.entrada{color:#22c55e;} .saida{color:#ef4444;}
.delete{background:var(--danger); padding:4px 8px; font-size:12px; border-radius:6px;}
.alerta{color:var(--warning); font-weight:bold;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>
</head>

<body>
<header>💳 Finanças PRO+</header>

<!-- Metas -->
<div class="card">
  <h3>Meta Mensal</h3>
  <div class="barra-meta"><div id="barraMeta" class="barra-preenchida"></div></div>
  <p id="metaInfo">R$0 | Falta: R$0</p>
  <p id="alertaMeta"></p>
  <input id="metaValor" placeholder="Valor da meta"><button onclick="definirMeta()">Salvar Meta</button>
</div>

<!-- Renda Fixa -->
<div class="card">
  <h3>Renda Fixa</h3>
  <input id="rendaFixaValor" placeholder="Valor">
  <input id="rendaFixaCategoria" placeholder="Categoria">
  <button onclick="addRendaFixa()">Adicionar Renda Fixa</button>
  <div id="listaRendaFixa"></div>
</div>

<!-- Despesas Fixas -->
<div class="card">
  <h3>Despesas Fixas</h3>
  <input id="despFixaValor" placeholder="Valor">
  <input id="despFixaCategoria" placeholder="Categoria">
  <button onclick="addDespFixa()">Adicionar Despesa Fixa</button>
  <div id="listaDespFixa"></div>
</div>

<!-- Extras -->
<div class="card">
  <h3>Extras</h3>
  <input id="extraValor" placeholder="Valor">
  <input id="extraCategoria" placeholder="Categoria">
  <input type="date" id="extraData">
  <button onclick="addExtra()">Adicionar Extra</button>
  <div id="listaExtras"></div>
</div>

<!-- Despesas Variáveis -->
<div class="card">
  <h3>Despesas do Mês</h3>
  <input id="despValor" placeholder="Valor">
  <input id="despCategoria" placeholder="Categoria">
  <input type="date" id="despData">
  <button onclick="addDesp()">Adicionar Despesa</button>
  <div id="listaDespesas"></div>
</div>

<!-- Resumo -->
<div class="card grid">
  <div class="stat"><small>Saldo</small><h3 id="saldo">R$0</h3></div>
  <div class="stat"><small>Entradas</small><h3 id="entradas">R$0</h3></div>
  <div class="stat"><small>Saídas</small><h3 id="saidas">R$0</h3></div>
  <div class="stat"><small>Reserva</small><h3 id="reserva">R$0</h3></div>
</div>

<!-- Gráficos -->
<div class="card grid">
  <div><canvas id="graficoCategorias"></canvas></div>
  <div><canvas id="graficoEvolucao"></canvas></div>
</div>

<div class="card">
  <h3>Previsão de saldo futuro (30 dias)</h3>
  <p id="previsao"></p>
  <button onclick="logout()">Sair</button>
</div>

<script type="module">
// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Config
const firebaseConfig = {
  apiKey: "AIzaSyDC9bzY8IsavRdL9N4L8B0IQgOSQ-qgE_Y",
  authDomain: "financasbarreto-30f9d.firebaseapp.com",
  projectId: "financasbarreto-30f9d",
  storageBucket: "financasbarreto-30f9d.firebasestorage.app",
  messagingSenderId: "673333294399",
  appId: "1:673333294399:web:86fc5b776191e42d648f8a",
  measurementId: "G-7RC7ES7824"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Elementos
const saldoElem=document.getElementById("saldo");
const entradasElem=document.getElementById("entradas");
const saidasElem=document.getElementById("saidas");
const reservaElem=document.getElementById("reserva");
const barraMeta=document.getElementById("barraMeta");
const alertaMeta=document.getElementById("alertaMeta");
const metaInfo=document.getElementById("metaInfo");
const previsao=document.getElementById("previsao");

// Variáveis
let meta = Number(localStorage.getItem("meta"))||0;
let reserva = Number(localStorage.getItem("reserva"))||0;
let rendaFixa=[], despFixa=[], extras=[], despesas=[];

// Logout
function logout(){ signOut(auth).then(()=>window.location.href="login.html"); }
window.logout = logout;
function definirMeta(){ meta=Number(document.getElementById("metaValor").value)||0; localStorage.setItem("meta",meta); atualizar(); }
window.definirMeta = definirMeta;

// Funções genéricas para adicionar itens
async function adicionarItem(collectionName, valor, categoria, data=null){
  const user = auth.currentUser;
  if(!user) return alert("Faça login primeiro");
  const d = {valor:Number(valor), categoria, data: data||new Date().toISOString().split("T")[0]};
  await addDoc(collection(db, "usuarios", user.uid, collectionName), d);
}

// Funções específicas
window.addRendaFixa = ()=>{ const v=document.getElementById("rendaFixaValor").value, c=document.getElementById("rendaFixaCategoria").value; if(!v||!c)return; adicionarItem("rendaFixa",v,c); document.getElementById("rendaFixaValor").value=""; };
window.addDespFixa = ()=>{ const v=document.getElementById("despFixaValor").value, c=document.getElementById("despFixaCategoria").value; if(!v||!c)return; adicionarItem("despesasFixas",v,c); document.getElementById("despFixaValor").value=""; };
window.addExtra = ()=>{ const v=document.getElementById("extraValor").value, c=document.getElementById("extraCategoria").value, d=document.getElementById("extraData").value; if(!v||!c||!d)return; adicionarItem("extras",v,c,d); document.getElementById("extraValor").value=""; };
window.addDesp = ()=>{ const v=document.getElementById("despValor").value, c=document.getElementById("despCategoria").value, d=document.getElementById("despData").value; if(!v||!c||!d)return; adicionarItem("despesasMes",v,c,d); document.getElementById("despValor").value=""; };

// Carregar coleções em tempo real
function carregarColecao(nome, setter){
  const user = auth.currentUser; if(!user) return;
  const ref = collection(db,"usuarios",user.uid,nome);
  onSnapshot(ref, snapshot=>{
    const arr=[]; snapshot.forEach(d=>arr.push({id:d.id,...d.data()})); setter(arr); atualizar();
  });
}

// Atualizar tela
let chartCategorias, chartEvolucao;
function atualizar(){
  // Reset
  let saldo=0, entradas=0, saidas=0;
  let listaIds = ["listaRendaFixa","listaDespFixa","listaExtras","listaDespesas"];
  listaIds.forEach(id=>document.getElementById(id).innerHTML="");

  // Entradas: renda fixa + extras
  rendaFixa.forEach(d=>{saldo+=d.valor; entradas+=d.valor; document.getElementById("listaRendaFixa").innerHTML+=`<div class="transacao"><div>${d.categoria} - ${d.valor}</div></div>`;});
  extras.forEach(d=>{saldo+=d.valor; entradas+=d.valor; document.getElementById("listaExtras").innerHTML+=`<div class="transacao"><div>${d.categoria} - ${d.valor}</div></div>`;});

  // Saídas: despesas fixas + despesas variáveis
  despFixa.forEach(d=>{saldo-=d.valor; saidas+=d.valor; document.getElementById("listaDespFixa").innerHTML+=`<div class="transacao"><div>${d.categoria} - ${d.valor}</div></div>`;});
  despesas.forEach(d=>{saldo-=d.valor; saidas+=d.valor; document.getElementById("listaDespesas").innerHTML+=`<div class="transacao"><div>${d.categoria} - ${d.valor}</div></div>`;});

  saldoElem.innerText=saldo.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  entradasElem.innerText=entradas.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  saidasElem.innerText=saidas.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  reservaElem.innerText=reserva.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  // Barra meta
  let p=meta>0?Math.min((saldo/meta)*100,100):0;
  barraMeta.style.width=p+"%";
  alertaMeta.innerText=saldo>=meta?"Meta atingida! 🎯":"";
  alertaMeta.className=saldo>=meta?"alerta":"";
  metaInfo.innerText=`${meta.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})} | Falta: ${(meta-saldo>0?(meta-saldo):0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}`;

  // Previsão
  let mediaEntradas=0;
  if(rendaFixa.length>0) mediaEntradas = rendaFixa.reduce((a,b)=>a+b.valor,0)/rendaFixa.length;
  previsao.innerText="Saldo estimado em 30 dias: "+(saldo+mediaEntradas*30).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});  
}

// Inicializa real-time
onAuthStateChanged(auth,user=>{
  if(!user) window.location.href="login.html";
  else {
    carregarColecao("rendaFixa", arr=>rendaFixa=arr);
    carregarColecao("despesasFixas", arr=>despFixa=arr);
    carregarColecao("extras", arr=>extras=arr);
    carregarColecao("despesasMes", arr=>despesas=arr);
  }
});
</script>
</body>
</html>
